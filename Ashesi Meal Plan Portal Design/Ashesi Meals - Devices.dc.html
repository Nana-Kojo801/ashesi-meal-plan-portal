<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{-webkit-font-smoothing:antialiased}
  </style>
</helmet>

<div style="min-height:100vh;background:#ECEAE6;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#1C1413;padding:54px 48px 70px;display:flex;flex-direction:column;align-items:center;gap:48px">

  <div style="text-align:center;max-width:680px">
    <div style="display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid #E3DAD0;padding:7px 16px 7px 9px;border-radius:99px;box-shadow:0 8px 20px -14px rgba(110,30,18,.4)">
      <span style="width:26px;height:26px;border-radius:8px;background:#D81E2C;display:flex;align-items:center;justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v7a3 3 0 0 0 3 3v8M7 3v6M10 3v6M18 3c-1.5 1-2 3-2 6s.5 4 2 5v7"/></svg></span>
      <span style="font-weight:700;font-size:13px;letter-spacing:.2px">Ashesi Meals · Subscriber Portal</span>
    </div>
    <h1 style="margin:22px 0 8px;font-size:38px;font-weight:800;letter-spacing:-1.4px;line-height:1.05">One app, every screen</h1>
    <p style="margin:0;font-size:15.5px;font-weight:500;color:#6E5F58;line-height:1.55">The same live prototype, responsive across desktop and mobile. Each frame below is interactive — click the nav, switch filters, reset a PIN.</p>
  </div>

  <!-- DESKTOP -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%">
    <div style="display:flex;align-items:center;gap:9px;font-size:12px;font-weight:800;letter-spacing:1.5px;color:#9A8A82;text-transform:uppercase">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Desktop
    </div>
    <div style="width:1060px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:0 50px 90px -40px rgba(40,12,8,.5);border:1px solid #DED5CB;background:#fff">
      <div style="height:46px;display:flex;align-items:center;gap:8px;padding:0 18px;background:#F4EFE9;border-bottom:1px solid #E7DDD3">
        <span style="width:12px;height:12px;border-radius:50%;background:#F4655A"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#F5BE4F"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#5AC15F"></span>
        <div style="flex:1;display:flex;justify-content:center">
          <div style="background:#fff;border:1px solid #E7DDD3;border-radius:99px;padding:6px 18px;font-size:12px;font-weight:600;color:#8A7A72">meals.ashesi.edu.gh</div>
        </div>
      </div>
      <iframe title="Ashesi Meals desktop" src="Ashesi%20Meal%20Plan.dc.html?demo=1&screen=home" style="width:100%;height:700px;border:0;display:block"></iframe>
    </div>
  </div>

  <!-- MOBILE -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%">
    <div style="display:flex;align-items:center;gap:9px;font-size:12px;font-weight:800;letter-spacing:1.5px;color:#9A8A82;text-transform:uppercase">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>
      Mobile
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:34px">

      <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="position:relative;background:#17120F;border-radius:48px;padding:11px;box-shadow:0 44px 70px -32px rgba(40,12,8,.6)">
          <div style="position:relative;width:380px;height:780px;border-radius:38px;overflow:hidden;background:#FBF6F0">
            <iframe title="Dashboard" src="Ashesi%20Meal%20Plan.dc.html?demo=1&screen=home" style="width:100%;height:100%;border:0;display:block"></iframe>
            <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:108px;height:24px;background:#17120F;border-radius:99px;z-index:5"></div>
          </div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#6E5F58">Dashboard</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="position:relative;background:#17120F;border-radius:48px;padding:11px;box-shadow:0 44px 70px -32px rgba(40,12,8,.6)">
          <div style="position:relative;width:380px;height:780px;border-radius:38px;overflow:hidden;background:#FBF6F0">
            <iframe title="History" src="Ashesi%20Meal%20Plan.dc.html?demo=1&screen=report" style="width:100%;height:100%;border:0;display:block"></iframe>
            <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:108px;height:24px;background:#17120F;border-radius:99px;z-index:5"></div>
          </div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#6E5F58">History</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="position:relative;background:#17120F;border-radius:48px;padding:11px;box-shadow:0 44px 70px -32px rgba(40,12,8,.6)">
          <div style="position:relative;width:380px;height:780px;border-radius:38px;overflow:hidden;background:#FBF6F0">
            <iframe title="Settings" src="Ashesi%20Meal%20Plan.dc.html?demo=1&screen=settings" style="width:100%;height:100%;border:0;display:block"></iframe>
            <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:108px;height:24px;background:#17120F;border-radius:99px;z-index:5"></div>
          </div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#6E5F58">Settings</div>
      </div>

    </div>
  </div>

</div>
</x-dc>
</body>
</html>
